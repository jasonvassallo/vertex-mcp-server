# Gemini Code Assist (GCA) GitHub app config.
#
# GCA is being SUNSET on 2026-06-18 and is replaced here by the Gemini CLI Action
# (.github/workflows/gemini-review.yml). To keep exactly ONE Gemini review per PR
# during the overlap, GCA's auto-review is disabled below — the Action is the
# single Gemini reviewer. (Delete this file once GCA is fully retired.)
# https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github
have_fun: false
code_review:
  disable: true
