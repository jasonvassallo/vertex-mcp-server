name: Claude Code

# MENTION-GATED profile (public repos): Claude only runs when a trusted
# collaborator writes "@claude" in an issue, PR, or review comment. This
# prevents anyone on the internet from triggering spend against your personal
# ANTHROPIC_API_KEY by opening a PR or comment on a public repo.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only trusted actors (OWNER/MEMBER/COLLABORATOR) can invoke @claude, so external
    # commenters on this public repo can't spend quota or steer a write-capable bot.
    # Review events additionally require the PR head to live in this repo (fork
    # guard — those payloads carry head-repo, so the check is declarative); the
    # issue_comment path resolves the same guard via the API in the first step
    # below, since its payload has no PR-head-repo field
    # (reference: jasonvassallo/dotfiles claude.yml).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association) && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # issue_comment payloads carry no PR-head-repo field, so the fork guard
      # is resolved via the API instead. Runs BEFORE checkout so a fork PR's
      # content is never fetched while this job's token is on disk; failing
      # the job is fail-closed.
      - name: Fail closed on fork PRs
        if: ${{ github.event.issue.pull_request }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          head_repo="$(gh api "$PR_URL" --jq '.head.repo.full_name')"
          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "PR head is from fork '$head_repo' — refusing to run @claude with credentials." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # claude-code-action's setupBranch runs a plain `git fetch origin` of
          # the PR branch BEFORE it configures its own git auth, so it depends
          # on the credentials actions/checkout persists in .git/config. With
          # persist-credentials: false that fetch dies ("could not read
          # Username for 'https://github.com'") and every run fails. The
          # persisted token is this job's least-privilege GITHUB_TOKEN
          # (contents: read), scoped to the job's lifetime.
          persist-credentials: true
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
