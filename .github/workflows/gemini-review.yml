name: Gemini Review

# Replaces the sunsetting Gemini Code Assist GitHub app with the Gemini CLI
# Action (google-github-actions/run-gemini-cli). Reviews each PR once on open,
# and again when someone comments "@gemini-cli" on the PR. No GitHub App needed:
# auth to the model is via the GEMINI_API_KEY secret; review comments are posted
# with the built-in GITHUB_TOKEN through the GitHub MCP server.

on:
  pull_request:
    types: [opened, synchronize]   # review on open + every new commit (iterate to green)
  issue_comment:
    types: [created]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    # Run on PR open, OR a comment on a PR that explicitly mentions @gemini-cli
    # (mention-gated so it doesn't fire on every comment or loop on its own).
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@gemini-cli') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gemini pull request review
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GEMINI_CLI_TRUST_WORKSPACE: 'true'   # headless CI: trust the checked-out workspace
          ISSUE_TITLE: '${{ github.event.pull_request.title || github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body || github.event.issue.body }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          # --- Auth: prefers Vertex AI (your GCP project, no free-tier limits) via
          # Workload Identity Federation when these repo vars are set; otherwise
          # falls back to the GEMINI_API_KEY secret. Set via repo Variables:
          #   GOOGLE_GENAI_USE_VERTEXAI=true, GOOGLE_CLOUD_PROJECT, GOOGLE_CLOUD_LOCATION,
          #   GCP_WIF_PROVIDER, SERVICE_ACCOUNT_EMAIL
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          # Explicit PR number so issue_comment triggers (which GitHub treats as
          # issues) still target the right pull request.
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": { "maxSessionTurns": 25 },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": { "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}" }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/pr-code-review'
