name: Gemini Review

# Replaces the sunsetting Gemini Code Assist GitHub app with the Gemini CLI
# Action (google-github-actions/run-gemini-cli). Reviews each PR once on open,
# and again when someone comments "@gemini-cli" on the PR. No GitHub App needed:
# auth to the model is via the GEMINI_API_KEY secret; review comments are posted
# with the built-in GITHUB_TOKEN through the GitHub MCP server.

on:
  pull_request:
    types: [opened, synchronize]   # review on open + every new commit (iterate to green)
  issue_comment:
    types: [created]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}'
  cancel-in-progress: true

jobs:
  review:
    # Run on PR open, OR a comment on a PR that explicitly mentions @gemini-cli
    # (mention-gated so it doesn't fire on every comment or loop on its own).
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@gemini-cli') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Gemini pull request review
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'   # so the gh CLI is authenticated
          GEMINI_CLI_TRUST_WORKSPACE: 'true'   # headless CI: trust the checked-out workspace
          ISSUE_TITLE: '${{ github.event.pull_request.title || github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body || github.event.issue.body }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          # Pin model: run-gemini-cli default gemini-3-flash 404s on Vertex (not entitled).
          gemini_model: "${{ vars.GEMINI_MODEL || 'gemini-flash-latest' }}"
          # --- Auth: prefers Vertex AI (your GCP project, no free-tier limits) via
          # Workload Identity Federation when these repo vars are set; otherwise
          # falls back to the GEMINI_API_KEY secret. Set via repo Variables:
          #   GOOGLE_GENAI_USE_VERTEXAI=true, GOOGLE_CLOUD_PROJECT, GOOGLE_CLOUD_LOCATION,
          #   GCP_WIF_PROVIDER, SERVICE_ACCOUNT_EMAIL
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          # Explicit PR number so issue_comment triggers (which GitHub treats as
          # issues) still target the right pull request.
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          # Review via the GitHub MCP server (the supported path). Expose its
          # full toolset (no includeTools allowlist) so the model can read the
          # PR and post a review; a too-narrow allowlist previously caused
          # tool-not-found loops. tools.exclude removes the dangerous built-ins
          # from discovery: without it, run_shell_command is available (the
          # action runs `gemini --yolo`), so a prompt injection in reviewed PR
          # content could execute shell with GITHUB_TOKEN/Gemini auth in the
          # env; write_file/replace and web_fetch are likewise injection-
          # controllable write/exfil channels a reviewer never needs.
          # NOT tools.core: an allowlist of built-ins also filters out the
          # GitHub MCP tools (verified empirically -- reviews silently stopped
          # posting), turning the reviewer into a no-op.
          # experimental.enableAgents: false blocks PR-shipped .gemini/agents
          # subagents, whose frontmatter can declare arbitrary mcpServers commands.
          # skills.enabled: false blocks PR-shipped .gemini/skills the same way;
          # google_web_search is excluded as a query-based exfil channel.
          settings: |-
            {
              "model": { "maxSessionTurns": 50 },
              "tools": { "exclude": ["run_shell_command", "write_file", "replace", "web_fetch", "save_memory", "google_web_search", "activate_skill"] },
              "experimental": { "enableAgents": false },
              "skills": { "enabled": false },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "env": { "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}" }
                }
              }
            }
          prompt: |
            You are a senior engineer reviewing pull request #${{ github.event.pull_request.number || github.event.issue.number }} in ${{ github.repository }}.

            Use the available GitHub tools to read the pull request — its changed files / diff and its description. If GEMINI.md or CLAUDE.md are in the diff or readable, use them for conventions.

            Review for correctness/bugs, security, performance, error handling, and test coverage.

            Then post exactly ONE review as a PR comment using the GitHub pull-request comment/review tool. Lead with a one-line summary, then bullet the findings (most important first) with file:line. Skip purely stylistic nits; if nothing material, say so briefly.
