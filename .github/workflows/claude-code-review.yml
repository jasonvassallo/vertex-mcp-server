name: Claude Code Review

# Automatic Claude review on every PR (opened / new commits). Posts feedback as a
# PR comment using the repo's CLAUDE.md (if present) for conventions. Requires the
# Claude GitHub App + the CLAUDE_CODE_OAUTH_TOKEN repo secret.

on:
  pull_request:
    types: [opened, synchronize]   # review on open + every new commit (iterate to green)

concurrency:
  group: 'claude-review-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip fork PRs: they don't receive repo secrets, so the run would fail.
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needs write so `gh pr comment` can post the review
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md (if present) for style and conventions.
            Be constructive and concise; skip purely stylistic nits.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowedTools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
