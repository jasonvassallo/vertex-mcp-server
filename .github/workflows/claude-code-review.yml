name: Claude Code Review

# Automatic Claude review on every PR (opened / new commits). Posts feedback as a
# PR comment using the repo's CLAUDE.md (if present). Requires the Claude GitHub
# App + the CLAUDE_CODE_OAUTH_TOKEN repo secret.

on:
  pull_request:
    types: [opened, synchronize]   # review on open + every new commit

concurrency:
  group: 'claude-review-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip fork PRs: they don't receive repo secrets, so the run would fail.
    # Skip PRs labeled 'trivial': the fleet's opt-out tier for super-trivial changes.
    if: github.event.pull_request.head.repo.fork == false && !contains(github.event.pull_request.labels.*.name, 'trivial')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needs write so `gh pr comment` can post the review
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        env:
          GH_TOKEN: ${{ github.token }}   # so the `gh pr comment` step authenticates
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md (if present) for style and conventions.
            Be constructive and concise; skip purely stylistic nits.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowedTools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
