name: Semgrep

# Semgrep Community Edition scan using public rulesets — no SEMGREP_APP_TOKEN,
# no Semgrep Cloud account, no data leaves the GitHub Actions runner. Rules are
# pulled from the open Semgrep Registry (p/* packs). Diff-aware on PRs (scans
# only changed files), full scan on pushes to the default branch.

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # Skip dependabot PRs (they can't access Actions context cleanly).
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          # Public rulesets: general best-practice, secrets, and Go security.
          SEMGREP_RULES: "p/default p/secrets p/golang"
